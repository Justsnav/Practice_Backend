<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div style="display: flex; justify-content: space-between; padding: 0px 100px;">

        <div id="notes">
            Loading...
        </div>

        <div>
            <input type="text" id="userNote" />
            <button onclick="addTodo()">Create new note</button>
        </div>

    </div>

    <script>

        async function addTodo() {

            await axios.post(
                "http://localhost:3000/notes",
                {
                    note: document.getElementById("userNote").value
                },
                {
                    headers: {
                        token: localStorage.getItem("token")
                    }
                }
            );

            document.getElementById("userNote").value = "";

            getTodos();
        }

        async function getTodos() {

            const response = await axios.get(
                "http://localhost:3000/notes",
                {
                    headers: {
                        token: localStorage.getItem("token")
                    }
                }
            );

            const notes = response.data.notes;

            document.getElementById("notes").innerHTML = "";

            for (let i = 0; i < notes.length; i++) {

                const noteNode = document.createElement("div");

                noteNode.innerHTML = notes[i].note;

                noteNode.setAttribute(
                    "style",
                    "border: 2px solid black; padding: 10px; margin: 10px;"
                );

                document.getElementById("notes").appendChild(noteNode);
            }
        }

        getTodos();

    </script>

</body>
</html>
